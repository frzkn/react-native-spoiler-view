name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm audit --omit=dev

  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: example
      - run: npm run check
        working-directory: example

  android-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - run: npm ci
      - run: npm ci
        working-directory: example
      - run: ./gradlew :react-native-spoiler-view:lintRelease
        working-directory: example/android
      - run: ./gradlew app:assembleRelease
        working-directory: example/android
      - if: always()
        run: ./gradlew --stop
        working-directory: example/android

  ios-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true
          working-directory: example
      - run: npm ci
      - run: npm ci
        working-directory: example
      - run: bundle exec pod install
        working-directory: example/ios
      - run: >-
          xcodebuild
          -workspace SpoilerViewExample.xcworkspace
          -scheme SpoilerViewExample
          -configuration Release
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
        working-directory: example/ios
